<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Submission - HyperMind Admin</title>
    <!-- Favicon -->
    <link rel="icon" href="../images/icon1.png" type="image/png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 48px 0 0;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
            background-color: #fff;
        }
        .sidebar-sticky {
            height: calc(100vh - 48px);
            overflow-x: hidden;
            overflow-y: auto;
        }
        .sidebar .nav-link {
            font-weight: 500;
            color: #333;
            padding: 0.75rem 1.25rem;
        }
        .sidebar .nav-link.active {
            color: #4f46e5;
        }
        .sidebar .nav-link:hover {
            color: #4338ca;
        }
        .sidebar .nav-link i {
            margin-right: 10px;
        }
        main {
            padding-top: 48px;
        }
        .navbar {
            box-shadow: 0 1px 2px rgba(0,0,0,.1);
            background-color: #fff;
        }
        .submission-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-bottom: 20px;
        }
        .submission-header {
            padding: 15px 20px;
            border-bottom: 1px solid #e9ecef;
        }
        .submission-body {
            padding: 20px;
        }
        .submission-info {
            padding: 15px 20px;
            background-color: #f8f9fa;
            border-radius: 0 0 8px 8px;
        }
        .badge {
            font-size: 0.8rem;
        }
        .notes-section {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-light fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="../images/logo.png" alt="HyperMind AI Logo" style="max-height: 40px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i> <span id="username-display">admin</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="sidebar-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">
                                <i class="fas fa-tachometer-alt"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="submissions.html">
                                <i class="fas fa-list"></i> All Submissions
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <i class="fas fa-envelope"></i> Newsletter
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <i class="fas fa-user-clock"></i> Waitlist
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <i class="fas fa-envelope-open-text"></i> Contact Forms
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <i class="fas fa-cog"></i> Settings
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">View Submission</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <div class="btn-group me-2">
                            <a href="submissions.html" class="btn btn-sm btn-outline-secondary">
                                <i class="fas fa-arrow-left"></i> Back to Submissions
                            </a>
                        </div>
                    </div>
                </div>

                <div id="submission-details">
                    <!-- Will be populated by JavaScript -->
                    <div class="text-center p-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-3">Loading submission details...</p>
                    </div>
                </div>

                <div class="notes-section">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Notes</h5>
                            <button class="btn btn-sm btn-primary" id="add-note-btn">
                                <i class="fas fa-plus"></i> Add Note
                            </button>
                        </div>
                        <div class="card-body">
                            <div id="notes-container">
                                <p class="text-muted text-center" id="no-notes-message">No notes yet.</p>
                            </div>
                            <div class="mt-3 d-none" id="add-note-form">
                                <form id="note-form">
                                    <div class="mb-3">
                                        <textarea class="form-control" id="note-content" rows="3" placeholder="Enter your note here..."></textarea>
                                    </div>
                                    <div class="text-end">
                                        <button type="button" class="btn btn-outline-secondary me-2" id="cancel-note-btn">Cancel</button>
                                        <button type="submit" class="btn btn-primary">Save Note</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is logged in
            if (localStorage.getItem('adminLoggedIn') !== 'true') {
                window.location.href = 'login.html';
                return;
            }
            
            // Update username display
            const usernameDisplay = document.getElementById('username-display');
            if (usernameDisplay) {
                usernameDisplay.textContent = localStorage.getItem('adminUsername') || 'admin';
            }
            
            // Logout functionality
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    localStorage.removeItem('adminLoggedIn');
                    localStorage.removeItem('adminUsername');
                    window.location.href = 'login.html';
                });
            }
            
            // Get submission ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const submissionId = urlParams.get('id') || 1;
            
            // Load submission details
            loadSubmissionDetails(submissionId);
            
            // Add note button
            const addNoteBtn = document.getElementById('add-note-btn');
            const addNoteForm = document.getElementById('add-note-form');
            const cancelNoteBtn = document.getElementById('cancel-note-btn');
            
            if (addNoteBtn) {
                addNoteBtn.addEventListener('click', function() {
                    addNoteForm.classList.remove('d-none');
                    document.getElementById('note-content').focus();
                });
            }
            
            if (cancelNoteBtn) {
                cancelNoteBtn.addEventListener('click', function() {
                    addNoteForm.classList.add('d-none');
                    document.getElementById('note-content').value = '';
                });
            }
            
            // Note form submission
            const noteForm = document.getElementById('note-form');
            if (noteForm) {
                noteForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const noteContent = document.getElementById('note-content').value.trim();
                    if (!noteContent) return;
                    
                    // In a real application, this would make an API call to save the note
                    // For now, just add it to the DOM
                    addNoteToDOM({
                        content: noteContent,
                        date: new Date().toLocaleString('en-US', {
                            year: 'numeric',
                            month: 'short',
                            day: '2-digit',
                            hour: '2-digit',
                            minute: '2-digit',
                            hour12: false
                        }),
                        author: localStorage.getItem('adminUsername') || 'admin'
                    });
                    
                    // Reset the form
                    document.getElementById('note-content').value = '';
                    addNoteForm.classList.add('d-none');
                    document.getElementById('no-notes-message').classList.add('d-none');
                });
            }
        });
        
        function loadSubmissionDetails(submissionId) {
            const submissionDetails = document.getElementById('submission-details');
            
            // In a real application, this would make an API call to get the data
            // For now, use mock data or generate a random submission if not found
            setTimeout(() => {
                let submission;
                
                // Try to find the submission in the mock data
                if (window.mockData && window.mockData.recentSubmissions) {
                    submission = window.mockData.recentSubmissions.find(sub => sub.id.toString() === submissionId.toString());
                }
                
                // If not found, create a mock submission
                if (!submission) {
                    const formTypes = ['contact', 'newsletter', 'waitlist'];
                    const randomFormType = formTypes[Math.floor(Math.random() * formTypes.length)];
                    
                    submission = {
                        id: submissionId,
                        date: new Date().toLocaleString('en-US', {
                            year: 'numeric',
                            month: 'short',
                            day: '2-digit',
                            hour: '2-digit',
                            minute: '2-digit',
                            hour12: false
                        }),
                        formType: randomFormType,
                        email: `user${submissionId}@example.com`,
                        name: `User ${submissionId}`,
                        company: randomFormType === 'contact' ? `Company ${submissionId}` : '',
                        position: randomFormType === 'contact' ? `Position ${submissionId}` : '',
                        message: randomFormType === 'contact' ? `This is a sample message from User ${submissionId}.` : '',
                        isRead: Math.random() > 0.5
                    };
                }
                
                // Build the HTML
                let html = `
                    <div class="submission-card">
                        <div class="submission-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Submission #${submission.id}</h5>
                            <span class="badge ${submission.isRead ? 'bg-secondary' : 'bg-warning'}">${submission.isRead ? 'Read' : 'Unread'}</span>
                        </div>
                        <div class="submission-body">
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <p><strong>Form Type:</strong> <span class="badge bg-secondary">${submission.formType}</span></p>
                                    <p><strong>Date:</strong> ${submission.date}</p>
                                    <p><strong>Email:</strong> ${submission.email}</p>
                                    <p><strong>Name:</strong> ${submission.name || 'N/A'}</p>
                                </div>
                                <div class="col-md-6">
                                    ${submission.company ? `<p><strong>Company:</strong> ${submission.company}</p>` : ''}
                                    ${submission.position ? `<p><strong>Position:</strong> ${submission.position}</p>` : ''}
                                </div>
                            </div>
                            ${submission.message ? `
                                <div class="mb-4">
                                    <h6>Message:</h6>
                                    <div class="p-3 bg-light rounded">
                                        <p>${submission.message}</p>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                        <div class="submission-info d-flex justify-content-between align-items-center">
                            <div>
                                <small class="text-muted">IP Address: 192.168.1.${Math.floor(Math.random() * 255)}</small>
                            </div>
                            <div>
                                ${!submission.isRead ? `
                                    <button class="btn btn-sm btn-outline-secondary btn-mark-read" data-id="${submission.id}">
                                        <i class="fas fa-check"></i> Mark as Read
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
                
                submissionDetails.innerHTML = html;
                
                // Add event listener to mark as read button
                const markReadBtn = document.querySelector('.btn-mark-read');
                if (markReadBtn) {
                    markReadBtn.addEventListener('click', function() {
                        // In a real application, this would make an API call
                        this.parentNode.innerHTML = '';
                        document.querySelector('.badge.bg-warning').classList.replace('bg-warning', 'bg-secondary');
                        document.querySelector('.badge.bg-secondary').textContent = 'Read';
                        alert(`Marked submission #${this.getAttribute('data-id')} as read`);
                    });
                }
            }, 500); // Simulate network delay
        }
        
        function addNoteToDOM(note) {
            const notesContainer = document.getElementById('notes-container');
            
            const noteDiv = document.createElement('div');
            noteDiv.className = 'card mb-3';
            noteDiv.innerHTML = `
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <small class="text-muted">Added by ${note.author} on ${note.date}</small>
                        <button class="btn btn-sm btn-outline-danger delete-note-btn">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <p class="mb-0">${note.content}</p>
                </div>
            `;
            
            // Add delete functionality
            const deleteBtn = noteDiv.querySelector('.delete-note-btn');
            deleteBtn.addEventListener('click', function() {
                if (confirm('Are you sure you want to delete this note?')) {
                    noteDiv.remove();
                    
                    // If no notes left, show the no notes message
                    if (notesContainer.querySelectorAll('.card').length === 0) {
                        document.getElementById('no-notes-message').classList.remove('d-none');
                    }
                }
            });
            
            notesContainer.appendChild(noteDiv);
        }
    </script>
</body>
</html>
